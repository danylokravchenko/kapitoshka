<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Kapitoshka — Coding Agent</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A cute water droplet character (Kapitoshka) dressed as a coding agent, holding a laptop, with code symbols around it.</desc>
  <defs>
    
  </defs>

  <!-- Floating code snippets background -->
  <text x="40" y="100" opacity="0.4" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">fn main()</text>
  <text x="560" y="130" opacity="0.35" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">git push</text>
  <text x="55" y="390" opacity="0.3" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">cargo run</text>
  <text x="565" y="370" opacity="0.35" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">npm i</text>
  <text x="80" y="460" opacity="0.25" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">println!</text>
  <text x="550" y="450" opacity="0.28" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">debug()</text>
  <text x="140" y="80" opacity="0.3" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">use std::</text>
  <text x="460" y="88" opacity="0.3" style="fill:rgb(110, 231, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">async fn</text>

  <!-- ===== BODY — droplet shape ===== -->
  <!-- Main droplet: rounded bottom + pointy top -->
  <path d="M340 110 C340 110 260 200 245 290 C230 370 270 430 340 435 C410 430 450 370 435 290 C420 200 340 110 340 110 Z" fill="#38bdf8" stroke="#0ea5e9" stroke-width="2.5" style="fill:rgb(56, 189, 248);stroke:rgb(14, 165, 233);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

